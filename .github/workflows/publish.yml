name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: CLI smoke
        run: bun run memdex -- --help

      - name: Package dry run
        working-directory: packages/memdex
        run: bun pm pack --dry-run

      - name: Publish
        working-directory: packages/memdex
        run: npm publish --access public --provenance
